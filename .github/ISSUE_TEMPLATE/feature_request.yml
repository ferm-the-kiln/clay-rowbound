name: Feature Request
description: Suggest a feature for Rowbound
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to see.
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Why would this feature be useful?
