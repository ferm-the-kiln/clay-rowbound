/* ═══════════════════════════════════════════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
   PILL EDITOR — column reference pills in expressions
   ═══════════════════════════════════════════════════════════════════════════ */

/** Build a columnId → columnName map from current tab config */
function getColumnIdMap() {
  var tc = getTabConfig();
  return tc ? tc.columns : {};
}

/** Get all available column names — tracked columns + any untracked sheet headers */
function getAllColumnNames() {
  var names = {};
  // Tracked columns from config (have stable IDs)
  var colMap = getColumnIdMap();
  for (var id in colMap) names[colMap[id]] = id;
  // Also include sheet headers that may not be tracked yet
  var headers = (state.columnInfo && state.columnInfo.headers) || [];
  for (var i = 0; i < headers.length; i++) {
    if (!names[headers[i]]) names[headers[i]] = '';
  }
  return names;
}

/** Build a columnName → columnId reverse map */
function getColumnNameToIdMap() {
  var map = getColumnIdMap();
  var rev = {};
  for (var id in map) rev[map[id]] = id;
  return rev;
}

/** Resolve {{colId}} refs in a string to {{Column Name}} for display */
function resolveIds(expr) {
  if (!expr) return '';
  var colMap = getColumnIdMap();
  return expr.replace(/\{\{([^}]+)\}\}/g, function(match, ref) {
    var trimmed = ref.trim();
    // Skip env/item refs
    if (trimmed.indexOf('env.') === 0 || trimmed.indexOf('item.') === 0) return match;
    var name = colMap[trimmed];
    return name ? '{{' + name + '}}' : match;
  });
}

// Keep old name as alias
var resolveExpressionIds = resolveIds;

/** Resolve all {{colId}} refs in an entire action object for display */
function resolveActionForDisplay(a) {
  var copy = deepCopy(a);
  var stringFields = ['prompt', 'expression', 'when', 'url', 'command', 'extract', 'matchValue', 'matchColumn', 'expand', '_ai_prompt'];
  for (var i = 0; i < stringFields.length; i++) {
    var k = stringFields[i];
    if (copy[k] && typeof copy[k] === 'string') copy[k] = resolveIds(copy[k]);
  }
  // Resolve body if it has templates
  if (copy.body) {
    var bodyStr = JSON.stringify(copy.body);
    var resolved = resolveIds(bodyStr);
    if (resolved !== bodyStr) {
      try { copy.body = JSON.parse(resolved); } catch(e) {}
    }
  }
  // Resolve write action columns
  if (copy.columns && typeof copy.columns === 'object') {
    var newCols = {};
    for (var ck in copy.columns) {
      newCols[ck] = resolveIds(copy.columns[ck]);
    }
    copy.columns = newCols;
  }
  return copy;
}

/** Convert {{Column Name}} to {{colId}} in a string for storage */
function storeIds(expr) {
  if (!expr) return '';
  var rev = getColumnNameToIdMap();
  return expr.replace(/\{\{([^}]+)\}\}/g, function(match, ref) {
    var trimmed = ref.trim();
    if (trimmed.indexOf('env.') === 0 || trimmed.indexOf('item.') === 0) return match;
    var id = rev[trimmed];
    return id ? '{{' + id + '}}' : match;
  });
}

var storeExpressionIds = storeIds;

/** Convert all {{Column Name}} refs in a saved action to {{colId}} */
function storeActionIds(a) {
  var stringFields = ['prompt', 'expression', 'when', 'url', 'command', 'extract', 'matchValue', 'matchColumn', 'expand', '_ai_prompt'];
  for (var i = 0; i < stringFields.length; i++) {
    var k = stringFields[i];
    if (a[k] && typeof a[k] === 'string') a[k] = storeIds(a[k]);
  }
  if (a.body) {
    var bodyStr = JSON.stringify(a.body);
    var stored = storeIds(bodyStr);
    if (stored !== bodyStr) {
      try { a.body = JSON.parse(stored); } catch(e) {}
    }
  }
  if (a.columns && typeof a.columns === 'object') {
    var newCols = {};
    for (var ck in a.columns) {
      newCols[ck] = storeIds(a.columns[ck]);
    }
    a.columns = newCols;
  }
  return a;
}

/* ═══════════════════════════════════════════════════════════════════════════
   GLOBAL / COLUMN PICKER — type / in any input/textarea to insert {{Column}}
   ═══════════════════════════════════════════════════════════════════════════ */

var _colPickerItems = [];
var _colPickerIdx = -1;
var _colPickerTarget = null;
var _colPickerTriggerPos = -1;
/** Force-fetch fresh headers from the sheet. Calls back when done. */
function fetchFreshHeaders(callback) {
  if (!state.columnInfo || !state.columnInfo.tabName) {
    if (callback) callback();
    return;
  }
  serverCall('getTabHeaders', state.columnInfo.tabName, function(err, headers) {
    if (!err && headers) {
      state.columnInfo.headers = headers;
    }
    if (callback) callback();
  });
}

/** Global listener: detect / in any input or textarea to show column picker */
document.addEventListener('input', function(e) {
  var el = e.target;
  if (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') return;

  var val = el.value;
  var pos = el.selectionStart;
  var before = val.substring(0, pos);

  // Check if user just typed / or is mid-filter after /
  var match = before.match(/\/([^/\n]*)$/);
  if (match && (match.index === 0 || before[match.index - 1] !== '/')) {
    _colPickerTarget = el;
    _colPickerTriggerPos = match.index;
    // Refresh headers in background to catch new columns
    fetchFreshHeaders();
    showColPicker(el, match[1]);
  } else {
    hideColPicker();
  }
});

document.addEventListener('keydown', function(e) {
  var dropdown = document.getElementById('col-picker');
  if (!dropdown || dropdown.style.display === 'none') return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _colPickerIdx = Math.min(_colPickerIdx + 1, _colPickerItems.length - 1);
    highlightColPickerItem();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _colPickerIdx = Math.max(_colPickerIdx - 1, 0);
    highlightColPickerItem();
  } else if (e.key === 'Enter' && _colPickerIdx >= 0) {
    e.preventDefault();
    selectColPickerItem(_colPickerIdx);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    hideColPicker();
  } else if (e.key === 'Tab' && _colPickerIdx >= 0) {
    e.preventDefault();
    selectColPickerItem(_colPickerIdx);
  }
});

function showColPicker(el, filter) {
  var dropdown = document.getElementById('col-picker');
  if (!dropdown) {
    dropdown = document.createElement('div');
    dropdown.id = 'col-picker';
    dropdown.className = 'pill-dropdown';
    dropdown.style.display = 'none';
    document.body.appendChild(dropdown);
  }

  // Use all available columns (tracked + untracked sheet headers)
  var allCols = getAllColumnNames();
  var entries = [];
  for (var name in allCols) {
    if (!filter || name.toLowerCase().indexOf(filter.toLowerCase()) >= 0) {
      entries.push({ id: allCols[name], name: name });
    }
  }
  entries.sort(function(a, b) { return a.name.localeCompare(b.name); });
  _colPickerItems = entries;
  _colPickerIdx = entries.length > 0 ? 0 : -1;

  var h = '';
  if (entries.length === 0) {
    h = '<div class="pill-dropdown-empty">No columns found</div>';
  } else {
    for (var i = 0; i < entries.length; i++) {
      h += '<div class="pill-dropdown-item' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '" onmousedown="selectColPickerItem(' + i + ')">' + esc(entries[i].name) + '</div>';
    }
  }
  safeSetHTML(dropdown, h);

  // Position dropdown below the input
  var rect = el.getBoundingClientRect();
  dropdown.style.position = 'fixed';
  dropdown.style.left = rect.left + 'px';
  dropdown.style.top = (rect.bottom + 2) + 'px';
  dropdown.style.width = rect.width + 'px';
  dropdown.style.display = 'block';
}

function highlightColPickerItem() {
  var items = document.querySelectorAll('#col-picker .pill-dropdown-item');
  for (var i = 0; i < items.length; i++) {
    items[i].className = 'pill-dropdown-item' + (i === _colPickerIdx ? ' active' : '');
  }
  if (items[_colPickerIdx]) items[_colPickerIdx].scrollIntoView({ block: 'nearest' });
}

function selectColPickerItem(idx) {
  var entry = _colPickerItems[idx];
  if (!entry || !_colPickerTarget) return;

  var el = _colPickerTarget;
  var val = el.value;
  var cursorPos = el.selectionStart;

  // Replace /filter with {{Column Name}}
  var before = val.substring(0, _colPickerTriggerPos);
  var after = val.substring(cursorPos);
  var insert = '{{' + entry.name + '}}';

  el.value = before + insert + after;
  var newPos = before.length + insert.length;
  el.setSelectionRange(newPos, newPos);
  el.focus();

  // Trigger input event so any listeners pick up the change
  el.dispatchEvent(new Event('input', { bubbles: true }));

  hideColPicker();
}

function hideColPicker() {
  var dropdown = document.getElementById('col-picker');
  if (dropdown) dropdown.style.display = 'none';
  _colPickerItems = [];
  _colPickerIdx = -1;
  _colPickerTarget = null;
}

// Hide picker when clicking outside
document.addEventListener('mousedown', function(e) {
  var dropdown = document.getElementById('col-picker');
  if (dropdown && dropdown.style.display !== 'none' && !dropdown.contains(e.target)) {
    hideColPicker();
  }
});

/** Populate the sheet tab selector dropdown */
function updateSheetTabSelector() {
  var select = document.getElementById('sheet-tab-select');
  if (!select) return;
  var currentGid = state.columnInfo ? state.columnInfo.tabGid : '';
  var h = '';
  for (var i = 0; i < state.tabs.length; i++) {
    var t = state.tabs[i];
    h += '<option value="' + esc(t.gid) + '"' + (t.gid === currentGid ? ' selected' : '') + '>' + esc(t.name) + '</option>';
  }
  select.innerHTML = h;
}

/** Handle sheet tab selection from dropdown — fetches headers then renders */
function onSheetTabSelect(gid) {
  if (!gid || !state.config || !state.columnInfo) return;
  if (gid === state.columnInfo.tabGid) return;

  // Find the tab
  var tab = null;
  for (var i = 0; i < state.tabs.length; i++) {
    if (state.tabs[i].gid === gid) { tab = state.tabs[i]; break; }
  }
  if (!tab) return;

  // Update tab identity immediately
  state.columnInfo.tabName = tab.name;
  state.columnInfo.tabGid = tab.gid;
  state.columnInfo.headers = [];
  ensureConfig();

  // Render overview immediately (doesn't need headers), then fetch headers
  refreshCurrentView();

  // Fetch fresh headers so column dropdowns work correctly
  serverCall('getTabHeaders', tab.name, function(err, headers) {
    if (!err && headers && state.columnInfo.tabName === tab.name) {
      state.columnInfo.headers = headers;
    }
  });
}

function applyInitData(data) {
  state.config = data.config;
  state.columnInfo = data.columnInfo;
  state.tabs = data.tabs || [];
  if (data.configVersion !== undefined) _knownConfigVersion = data.configVersion;
  ensureConfig();
  updateSheetTabSelector();

  // Show sheet selector and tab bar now that data is loaded
  var sheetSel = document.getElementById('sheet-tab-selector');
  var tabBar = document.getElementById('tab-bar');
  if (sheetSel) sheetSel.style.display = '';
  if (tabBar) tabBar.style.display = 'flex';

  // Only navigate to a view on first load — don't interrupt if user is mid-edit
  if (!state.editingAction && !state.editingSource && !state.editingScript) {
    switch (data.initialView) {
      case 'overview': showOverview(); break;
      case 'sources': showSources(); break;
      case 'settings': showSettings(); break;
      default: showOverview(); break;
    }
  }
}

var _initDone = false;

function init() {
  // Show skeleton until fresh data arrives — don't render from stale cache
  // because it causes the view to reset if the user navigates before data loads
  serverCall('getInitData', undefined, function(err, data) {
    if (err) {
      safeSetHTML(document.getElementById('content'),
        '<div class="empty-state"><div class="empty-state-title">Error loading</div>' +
        '<p>' + esc(err.message || 'Unknown error') + '</p></div>');
      return;
    }
    try { sessionStorage.setItem('rb_initData', JSON.stringify(data)); } catch (e) {}
    _initDone = true;
    applyInitData(data);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  init();
});

/** Show a skeleton loading state with the new tab name so the user
 *  sees instant feedback while we fetch the tab's config. */
/** Re-render the current list view (overview/sources/settings). */
function refreshCurrentView() {
  switch (state.view) {
    case 'overview': showOverview(); break;
    case 'sources': showSources(); break;
    case 'settings': showSettings(); break;
  }
}

// Track known config version
var _knownConfigVersion = 0;
var _refreshing = false;

/**
 * Refresh everything — config, tabs, headers. Called by the refresh button
 * and automatically after save/delete operations.
 */
function refreshAll(callback) {
  if (_refreshing && !callback) return;
  _refreshing = true;

  // Visual feedback
  var btn = document.getElementById('refresh-btn');
  if (btn) btn.style.opacity = '0.5';

  serverCall('getInitData', undefined, function(err, data) {
    _refreshing = false;
    if (btn) btn.style.opacity = '1';
    if (err || !data) {
      if (callback) callback();
      return;
    }

    state.config = data.config;
    state.tabs = data.tabs || [];
    if (data.configVersion !== undefined) _knownConfigVersion = data.configVersion;

    // Update headers for current tab
    if (data.columnInfo) {
      state.columnInfo.headers = data.columnInfo.headers;
    }

    updateSheetTabSelector();
    try { sessionStorage.setItem('rb_initData', JSON.stringify(data)); } catch (e) {}

    if (callback) {
      callback();
    } else if (!state.editingAction && !state.editingSource && !state.editingScript) {
      refreshCurrentView();
    }
  });
}
</script>
</body>
