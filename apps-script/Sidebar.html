function field(label, input, hint) {
  var h = '<div class="field">' + fieldLabel(label) + input;
  if (hint) h += '<div class="field-hint">' + esc(hint) + '</div>';
  return h + '</div>';
}

function fieldLabel(label) {
  return '<label class="field-label">' + esc(label) + '</label>';
}

function opt(value, current) {
  return '<option value="' + esc(value) + '"' + (value === current ? ' selected' : '') + '>' +
         esc(value) + '</option>';
}
function labelOpt(value, label, current) {
  return '<option value="' + esc(value) + '"' + (value === current ? ' selected' : '') + '>' +
         esc(label) + '</option>';
}

function getVal(name) {
  var el = document.querySelector('[name="' + name + '"]');
  return el ? el.value : '';
}

function buildTabSelect(name, current) {
  var h = '<select class="field-select" name="' + esc(name) + '">';
  h += '<option value="">\u2014 Select tab \u2014</option>';
  for (var i = 0; i < state.tabs.length; i++) {
    var t = state.tabs[i];
    h += '<option value="' + esc(t.name) + '"' + (t.name === current ? ' selected' : '') + '>' +
         esc(t.name) + '</option>';
  }
  return h + '</select>';
}

function buildKvList(name, obj, keyLabel, valLabel) {
  var h = '<div class="kv-list" data-kv="' + esc(name) + '">';
  var keys = Object.keys(obj || {});
  if (keys.length === 0) {
    h += kvRowHtml('', '', keyLabel, valLabel);
  } else {
    for (var i = 0; i < keys.length; i++) {
      var v = typeof obj[keys[i]] === 'object' ? JSON.stringify(obj[keys[i]]) : String(obj[keys[i]]);
      h += kvRowHtml(keys[i], v, keyLabel, valLabel);
    }
  }
  h += '<button class="kv-add" onclick="addKvRow(this, \'' + esc(keyLabel).replace(/'/g, "\\'") + '\', \'' + esc(valLabel).replace(/'/g, "\\'") + '\')">+ Add</button>';
  h += '</div>';
  return h;
}

function kvRowHtml(key, val, keyPh, valPh) {
  return '<div class="kv-row">' +
    '<input value="' + esc(key) + '" placeholder="' + esc(keyPh) + '" data-kv-key>' +
    '<input value="' + esc(val) + '" placeholder="' + esc(valPh) + '" data-kv-val>' +
    '<button class="kv-remove" onclick="removeKvRow(this)">&#215;</button></div>';
}

function addKvRow(btn, keyPh, valPh) {
  var list = btn.parentElement;
  var row = document.createElement('div');
  row.className = 'kv-row';
  var ki = document.createElement('input');
  ki.placeholder = keyPh; ki.setAttribute('data-kv-key', '');
  var vi = document.createElement('input');
  vi.placeholder = valPh; vi.setAttribute('data-kv-val', '');
  var rb = document.createElement('button');
  rb.className = 'kv-remove'; rb.textContent = '\u00d7';
  rb.onclick = function() { removeKvRow(rb); };
  row.appendChild(ki); row.appendChild(vi); row.appendChild(rb);
  list.insertBefore(row, btn);
}

function removeKvRow(btn) {
  var row = btn.parentElement;
  var list = row.parentElement;
  row.remove();
  if (list.querySelectorAll('.kv-row').length === 0) {
    var addBtn = list.querySelector('.kv-add');
    if (addBtn) addBtn.click();
  }
}

function readKvList(name) {
  var list = document.querySelector('[data-kv="' + name + '"]');
  if (!list) return {};
  var rows = list.querySelectorAll('.kv-row');
  var result = {};
  for (var i = 0; i < rows.length; i++) {
    var k = rows[i].querySelector('[data-kv-key]').value.trim();
    var v = rows[i].querySelector('[data-kv-val]').value.trim();
    if (k) result[k] = v;
  }
  return result;
}

function flattenOnError(onError) {
  if (!onError) return {};
  var flat = {};
  var keys = Object.keys(onError);
  for (var i = 0; i < keys.length; i++) {
    var v = onError[keys[i]];
    flat[keys[i]] = (typeof v === 'object') ? JSON.stringify(v) : String(v);
  }
  return flat;
}

function parseOnError(flat) {
  if (!flat || Object.keys(flat).length === 0) return undefined;
  var result = {};
  var keys = Object.keys(flat);
  for (var i = 0; i < keys.length; i++) {
    var v = flat[keys[i]];
    try { result[keys[i]] = JSON.parse(v); } catch(e) { result[keys[i]] = v; }
  }
  return result;
}

function toggleUpsert(mode) {
  var el = document.getElementById('upsert-section');
  if (el) el.style.display = (mode === 'upsert') ? '' : 'none';
}

/* ═══════════════════════════════════════════════════════════════════════════
   READ FORM -> ACTION OBJECT
   ═══════════════════════════════════════════════════════════════════════════ */
function readFormAction() {
  var type = getVal('type');
  var a = {
    id: getVal('id').trim() || generateId(state.columnInfo.column, type),
    type: type,
    target: state.columnInfo.column
  };

  var when = getVal('when').trim();
  if (when) a.when = when;

  switch (type) {
    case 'http':
      a.method = getVal('method') || 'GET';
      a.url = getVal('url');
      a.extract = getVal('extract');
      var headers = readKvList('headers');
      if (Object.keys(headers).length > 0) a.headers = headers;
      var bodyStr = getVal('body').trim();
      if (bodyStr) { try { a.body = JSON.parse(bodyStr); } catch(e) { a.body = bodyStr; } }
      var onErr = parseOnError(readKvList('onError'));
      if (onErr) a.onError = onErr;
      break;

    case 'waterfall':
      a.providers = readProviders();
      break;

    case 'transform':
      a.expression = getVal('expression');
      break;

    case 'exec':
      a.command = getVal('command');
      var ext = getVal('extract').trim();
      if (ext) a.extract = ext;
      var timeout = parseInt(getVal('timeout'));
      if (timeout && timeout !== 10000) a.timeout = timeout;
      var execErr = parseOnError(readKvList('onError'));
      if (execErr) a.onError = execErr;
      break;

    case 'lookup':
      a.sourceTab = getVal('sourceTab');
      a.matchColumn = getVal('matchColumn');
      a.matchValue = getVal('matchValue');
      var mOp = getVal('matchOperator');
      if (mOp && mOp !== 'equals') a.matchOperator = mOp;
      a.returnColumn = getVal('returnColumn');
      var mMode = getVal('matchMode');
      if (mMode && mMode !== 'first') a.matchMode = mMode;
      break;

    case 'write':
      a.destTab = getVal('destTab');
      var mode = getVal('mode');
      if (mode && mode !== 'append') a.mode = mode;
      a.columns = readKvList('columns');
      if (mode === 'upsert') {
        var uc = getVal('upsertMatch_column').trim();
        var uv = getVal('upsertMatch_value').trim();
        if (uc) a.upsertMatch = { column: uc, value: uv };
      }
      var expand = getVal('expand').trim();
      if (expand) a.expand = expand;
      var expandPath = getVal('expandPath').trim();
      if (expandPath) a.expandPath = expandPath;
      break;

    case 'script':
      // Inline script: save code as a named script in the config, then reference it
      var inlineCode = getVal('_inlineCode').trim();
      var inlineRuntime = getVal('_inlineRuntime') || 'bash';
      var scriptName = a.id + '_script';
      if (inlineCode) {
        var scripts = getScripts();
        scripts[scriptName] = { runtime: inlineRuntime, code: inlineCode };
        setScripts(scripts);
      }
      a.script = scriptName;
      var args = readArgsList('args');
      if (args.length > 0) a.args = args;
      var ext = getVal('extract').trim();
      if (ext) a.extract = ext;
      var timeout = parseInt(getVal('timeout'));
      if (timeout && timeout !== 30000) a.timeout = timeout;
      break;

    case 'ai':
      // AI type is stored as an exec action with an auto-generated command
      a.type = 'exec';
      var aiRuntime = getVal('_ai_runtime') || 'claude';
      var aiModel = getVal('_ai_model').trim();
      var aiMaxTurns = getVal('_ai_maxTurns').trim() || '25';
      var aiTools = getVal('_ai_tools') === 'true';
      var aiPrompt = getVal('_ai_prompt').trim();

      // Read output definitions
      var aiOutputFormat = 'fields';
      var radios = document.querySelectorAll('input[name="_ai_outputFormat"]');
      for (var ri = 0; ri < radios.length; ri++) {
        if (radios[ri].checked) aiOutputFormat = radios[ri].value;
      }
      var aiOutputFields = readAiOutputFields();
      var aiOutputSchema = getVal('_ai_outputSchema').trim();

      // Build the output instruction to append to the prompt
      var outputInstruction = '';
      if (aiOutputFormat === 'fields' && aiOutputFields.length > 0) {
        var schemaObj = {};
        for (var ofi = 0; ofi < aiOutputFields.length; ofi++) {
          var typeMap = { text: 'string', number: 'number', boolean: 'boolean', url: 'string', email: 'string' };
          schemaObj[aiOutputFields[ofi].name] = typeMap[aiOutputFields[ofi].type] || 'string';
        }
        outputInstruction = '\n\nYour response must be ONLY a raw JSON object \u2014 no preamble, no commentary, no markdown fences. The very first character must be { and the very last must be }. Schema: ' + JSON.stringify(schemaObj);
      } else if (aiOutputFormat === 'json' && aiOutputSchema) {
        outputInstruction = '\n\nYour response must be ONLY a raw JSON object \u2014 no preamble, no commentary, no markdown fences. The very first character must be { and the very last must be }. Output must conform to this JSON Schema: ' + aiOutputSchema;
      }

      var fullPrompt = aiPrompt + outputInstruction;

      // Build the exec command
      var cmd;
      if (aiRuntime === 'claude') {
        cmd = 'claude -p';
        if (aiModel) cmd += ' --model ' + aiModel;
        if (aiMaxTurns && aiMaxTurns !== '0') cmd += ' --max-turns ' + aiMaxTurns;
        if (aiTools) cmd += ' --tools default';
        cmd += " --no-session-persistence '" + fullPrompt.replace(/'/g, "'\\''") + "' < /dev/null";
      } else {
        cmd = 'codex exec';
        if (aiModel) cmd += ' --model ' + aiModel;
        cmd += " -s read-only '" + fullPrompt.replace(/'/g, "'\\''") + "'";
      }
      a.command = cmd;
      // Tag it so the sidebar can detect it's an AI action when re-editing
      a._ai_runtime = aiRuntime;
      a._ai_model = aiModel;
      a._ai_maxTurns = aiMaxTurns;
      a._ai_prompt = aiPrompt; // Store original prompt WITHOUT output instructions
      a._ai_tools = aiTools;
      a._ai_outputFormat = aiOutputFormat;
      a._ai_outputFields = aiOutputFields;
      a._ai_outputSchema = aiOutputSchema;

      var timeout = parseInt(getVal('timeout'));
      if (timeout) a.timeout = timeout;
      var aiErr = parseOnError(readKvList('onError'));
      if (aiErr) a.onError = aiErr;
      break;
  }

  return a;
}

function readProviders() {
  var cards = document.querySelectorAll('.provider-card');
  var providers = [];
  for (var i = 0; i < cards.length; i++) {
    var idx = cards[i].getAttribute('data-idx');
    var p = {
      name: getVal('p_name_' + idx) || ('Provider ' + (i + 1)),
      method: getVal('p_method_' + idx) || 'GET',
      url: getVal('p_url_' + idx) || '',
      extract: getVal('p_extract_' + idx) || ''
    };
    var bodyStr = getVal('p_body_' + idx).trim();
    if (bodyStr) { try { p.body = JSON.parse(bodyStr); } catch(e) { p.body = bodyStr; } }
    var ph = readKvList('p_headers_' + idx);
    if (Object.keys(ph).length > 0) p.headers = ph;
    var pe = parseOnError(readKvList('p_onError_' + idx));
    if (pe) p.onError = pe;
    providers.push(p);
  }
  return providers;
}

/* ═══════════════════════════════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════════════════════════════ */
function onTypeChange(newType) {
  var a = state.editingAction;
  // Preserve when and id from current form
  a.when = getVal('when');
  a.id = generateId(a.target, newType);
  a.type = newType;
  // Clear type-specific fields
  delete a.method; delete a.url; delete a.headers; delete a.body;
  delete a.extract; delete a.onError; delete a.providers;
  delete a.expression; delete a.command; delete a.timeout;
  delete a.sourceTab; delete a.matchColumn; delete a.matchValue;
  delete a.matchOperator; delete a.returnColumn; delete a.matchMode;
  delete a.destTab; delete a.columns; delete a.mode;
  delete a.upsertMatch; delete a.expand; delete a.expandPath;
  delete a.script; delete a.args;
  // Set defaults per type
  if (newType === 'http') { a.method = 'GET'; a.url = ''; a.extract = ''; }
  if (newType === 'waterfall') { a.providers = []; }
  if (newType === 'transform') { a.expression = ''; }
  if (newType === 'exec') { a.command = ''; }
  if (newType === 'lookup') { a.sourceTab = ''; a.matchColumn = ''; a.matchValue = ''; a.returnColumn = ''; }
  if (newType === 'write') { a.destTab = ''; a.columns = {}; }
  if (newType === 'script') { a.script = ''; a.args = []; }
  renderEditorContent();
}

function switchColumn(col) {
  state.columnInfo.column = col;
  showColumn(col);
}

function editActionByIndex(idx) {
  var actions = getActions();
  if (idx >= 0 && idx < actions.length) {
    var a = actions[idx];
    var col = resolveColumnName(a.target);
    state.columnInfo.column = col;
    showEditor(a, col);
  }
}

function moveAction(idx, dir) {
  var actions = getActions();
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= actions.length) return;
  var temp = actions[idx];
  actions[idx] = actions[newIdx];
  actions[newIdx] = temp;
  setActions(actions);
  persistConfig('Action reordered');
  showOverview();
}

function saveAction() {
  var newAction = readFormAction();
  ensureConfig();
  var actions = getActions();

  var found = -1;
  if (state.originalAction) {
    for (var i = 0; i < actions.length; i++) {
      if (actions[i].id === state.originalAction.id) { found = i; break; }
    }
  }

  var isUpdate = found >= 0;
  if (isUpdate) {
    actions[found] = newAction;
  } else {
    actions.push(newAction);
  }
  setActions(actions);
  persistConfig(isUpdate ? 'Action updated' : 'Action created');
  if (isUpdate) {
    state.editingAction = deepCopy(newAction);
    state.originalAction = deepCopy(newAction);
  } else {
    showOverview();
  }
}

function cancelEdit() {
  showColumn(state.columnInfo ? state.columnInfo.column : '');
}

function confirmDelete() {
  var overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';

  var dialog = document.createElement('div');
  dialog.className = 'confirm-dialog';

  var title = document.createElement('h3');
  title.textContent = 'Delete Action';
  var msg = document.createElement('p');
  msg.textContent = 'Remove this action from the pipeline? This cannot be undone.';

  var btns = document.createElement('div');
  btns.className = 'confirm-dialog-btns';

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = function() { overlay.remove(); };

  var deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn btn-danger';
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = function() { doDelete(); };

  btns.appendChild(cancelBtn);
  btns.appendChild(deleteBtn);
  dialog.appendChild(title);
  dialog.appendChild(msg);
  dialog.appendChild(btns);
  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
}

function doDelete() {
  var overlay = document.querySelector('.confirm-overlay');
  if (overlay) overlay.remove();
  if (!state.originalAction) { showOverview(); return; }
  var actions = getActions();
  var filtered = actions.filter(function(a) { return a.id !== state.originalAction.id; });
  setActions(filtered);
  persistConfig('Action deleted');
  showOverview();
}

function addProvider() {
  state.editingAction.providers = readProviders();
  state.editingAction.providers.push({ name: '', method: 'GET', url: '', extract: '' });
  state.editingAction.when = getVal('when');
  state.editingAction.id = getVal('id');
  renderEditorContent();
}

function removeProvider(idx) {
  state.editingAction.providers = readProviders();
  state.editingAction.providers.splice(idx, 1);
  state.editingAction.when = getVal('when');
  state.editingAction.id = getVal('id');
  renderEditorContent();
}

function moveProvider(idx, dir) {
  var providers = readProviders();
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= providers.length) return;
  var temp = providers[idx];
  providers[idx] = providers[newIdx];
  providers[newIdx] = temp;
  state.editingAction.providers = providers;
  state.editingAction.when = getVal('when');
  state.editingAction.id = getVal('id');
  renderEditorContent();
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW: SCRIPTS
   ═══════════════════════════════════════════════════════════════════════════ */
function showScripts() {
  state.view = 'scripts';
  state.lastListView = 'scripts';
  updateTabBar('scripts');
  renderHeader('Scripts');

  var scripts = getScripts();
  var names = Object.keys(scripts);
  var h = '';

  if (names.length === 0) {
    h += '<div class="empty-state">';
    h += '<div class="empty-state-title">No scripts configured</div>';
    h += '<p>Scripts are reusable code blocks that can be referenced from actions and sources.</p>';
    h += '</div>';
  } else {
    for (var i = 0; i < names.length; i++) {
      var name = names[i];
      var sc = scripts[name];
      var snippet = (sc.code || '').substring(0, 80).replace(/\n/g, ' ');
      h += '<div class="action-item" onclick="editScript(\'' + esc(name).replace(/'/g, "\\'") + '\')">';
      h += '<div class="action-item-header">';
      h += '<span class="badge badge-script">' + esc(sc.runtime || 'bash') + '</span>';
      h += '<span class="action-item-title">' + esc(name) + '</span>';
      h += '</div>';
      h += '<div class="action-item-meta" style="font-family:monospace;font-size:11px">' + esc(snippet) + (sc.code && sc.code.length > 80 ? '...' : '') + '</div>';
      h += '</div>';
    }
  }
  safeSetHTML(document.getElementById('content'), h);
  renderFooter([
    'spacer',
    { label: '+ New Script', cls: 'btn-primary', action: 'showCreateScript()' }
  ]);
}

function showCreateScript() {
  state.view = 'scriptEditor';
  updateTabBar('scriptEditor');
  var sc = { runtime: 'bash', code: '' };
  state.editingScript = sc;
  state.originalScript = null;
  renderHeader('New Script', { back: 'showSettings()' });
  renderScriptEditorContent('');
  renderFooter([
    { label: 'Cancel', cls: 'btn-secondary', action: 'showSettings()' },
    'spacer',
    { label: 'Create', cls: 'btn-primary', action: 'saveScript()' }
  ]);
}

function editScript(name) {
  state.view = 'scriptEditor';
  updateTabBar('scriptEditor');
  var scripts = getScripts();
  var sc = deepCopy(scripts[name] || { runtime: 'bash', code: '' });
  state.editingScript = sc;
  state.originalScript = name;
  renderHeader('Script: ' + name, { back: 'showSettings()' });
  renderScriptEditorContent(name);
  renderFooter([
    { label: 'Delete', cls: 'btn-danger', action: 'confirmDeleteScript()' },
    'spacer',
    { label: 'Cancel', cls: 'btn-secondary', action: 'showSettings()' },
    { label: 'Save', cls: 'btn-primary', action: 'saveScript()' }
  ]);
}

function renderScriptEditorContent(name) {
  var sc = state.editingScript;
  var h = '';

  h += '<div class="section"><div class="section-title">Script</div>';
  h += field('Name', '<input class="field-input" name="script_name" value="' + esc(name || '') + '" placeholder="e.g. claude_json">', 'Unique name to reference this script');
  h += field('Runtime', '<select class="field-select" name="script_runtime">' +
    opt('bash', sc.runtime) + opt('python3', sc.runtime) + opt('node', sc.runtime) + '</select>',
    'Interpreter used to execute the script');
  h += '</div>';

  h += '<div class="section"><div class="section-title">Code</div>';
  h += field('', '<textarea class="field-textarea" name="script_code" rows="12" style="min-height:200px;font-family:\'SFMono-Regular\',\'Roboto Mono\',Consolas,monospace;font-size:12px;line-height:1.5" placeholder="#!/bin/bash\n...">' +
    esc(sc.code || '') + '</textarea>');
  h += '</div>';

  safeSetHTML(document.getElementById('content'), h);
}

function saveScript() {
  var name = getVal('script_name').trim();
  if (!name) { showToast('Script name is required', 'error'); return; }
  var sc = {
    runtime: getVal('script_runtime') || 'bash',
    code: getVal('script_code') || ''
  };
  ensureConfig();
  var scripts = getScripts();

  // If renaming (editing and name changed), remove old key
  if (state.originalScript && state.originalScript !== name) {
    delete scripts[state.originalScript];
  }

  scripts[name] = sc;
  setScripts(scripts);
  persistConfig(state.originalScript ? 'Script updated' : 'Script created');
  state.editingScript = deepCopy(sc);
  state.originalScript = name;
  showSettings();
}

function confirmDeleteScript() {
  var overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  var dialog = document.createElement('div');
  dialog.className = 'confirm-dialog';
  var title = document.createElement('h3');
  title.textContent = 'Delete Script';
  var msg = document.createElement('p');
  msg.textContent = 'Remove this script? Actions and sources referencing it will break.';
  var btns = document.createElement('div');
  btns.className = 'confirm-dialog-btns';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = function() { overlay.remove(); };
  var deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn btn-danger';
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = function() {
    overlay.remove();
    if (!state.originalScript) { showSettings(); return; }
    var scripts = getScripts();
    delete scripts[state.originalScript];
    setScripts(scripts);
    persistConfig('Script deleted');
    showSettings();
  };
  btns.appendChild(cancelBtn);
  btns.appendChild(deleteBtn);
  dialog.appendChild(title);
  dialog.appendChild(msg);
  dialog.appendChild(btns);
  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
}

/* ═══════════════════════════════════════════════════════════════════════════
   PERSIST
   ═══════════════════════════════════════════════════════════════════════════ */
function persistConfig(message) {
  serverCall('saveConfig', JSON.stringify(state.config), function(err) {
    if (err) {
      showToast('Error: ' + err.message, 'error');
    } else {
      showToast(message || 'Saved');
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════════════════════════════════════════ */
function applyInitData(data) {
  state.config = data.config;
  state.columnInfo = data.columnInfo;
  state.tabs = data.tabs || [];
  ensureConfig();
  switch (data.initialView) {
    case 'overview': showOverview(); break;
    case 'sources': showSources(); break;
    case 'settings': showSettings(); break;
    default: showOverview(); break;
  }
}

function init() {
  // Try to show from session cache instantly while fetching fresh data
  try {
    var cached = sessionStorage.getItem('rb_initData');
    if (cached) {
      applyInitData(JSON.parse(cached));
    }
  } catch (e) { /* sessionStorage may be unavailable in iframe */ }

  serverCall('getInitData', undefined, function(err, data) {
    if (err) {
      safeSetHTML(document.getElementById('content'),
        '<div class="empty-state"><div class="empty-state-title">Error loading</div>' +
        '<p>' + esc(err.message || 'Unknown error') + '</p></div>');
      return;
    }
    // Cache for instant load next time
    try { sessionStorage.setItem('rb_initData', JSON.stringify(data)); } catch (e) {}
    applyInitData(data);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  init();
  // Poll for external config changes (CLI, MCP, etc.) every 10s
  setInterval(pollConfigChanges, 10000);
});

/** Re-render the current list view (overview/sources/settings). */
function refreshCurrentView() {
  switch (state.view) {
    case 'overview': showOverview(); break;
    case 'sources': showSources(); break;
    case 'settings': showSettings(); break;
    // Don't refresh edit forms — user may be mid-edit
  }
}

/** Poll for config changes made outside the sidebar (CLI, MCP server, etc.).
 *  Skips polling when the user is editing an action/source/script to avoid
 *  clobbering in-flight form state. */
function pollConfigChanges() {
  // Don't poll while user is in an edit form
  if (state.editingAction || state.editingSource || state.editingScript) return;

  serverCall('loadConfigFresh', undefined, function(err, freshConfig) {
    if (err || !freshConfig) return;
    var current = JSON.stringify(state.config);
    var incoming = JSON.stringify(freshConfig);
    if (current !== incoming) {
      state.config = freshConfig;
      try { sessionStorage.setItem('rb_initData', JSON.stringify({
        config: freshConfig, columnInfo: state.columnInfo,
        tabs: state.tabs, initialView: state.view
      })); } catch (e) {}
      refreshCurrentView();
    }
  });
}
</script>
</body>
</html>
